<div class="app-shell">
  <svg-sprite />
  @if (shouldShowThemeToggle()) {
  <div class="app-shell__theme">
    <app-theme-toggle />
  </div>
  }
  <router-outlet />

  @if (pwaService.updateAvailable()) {
  <div class="update-banner">
    <p>¡Hay una nueva versión del juego disponible!</p>
    <button class="btn btn-primary" (click)="pwaService.updateNow()">Actualizar ahora</button>
  </div>
  }
</div>
