<div class="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="leave-confirm-title"
  aria-describedby="leave-confirm-description">
  <div class="confirm-modal">
    <h3 id="leave-confirm-title">{{ title() }}</h3>
    <p id="leave-confirm-description">
      {{ description() }}
    </p>
    <div class="confirm-actions">
      <button type="button" class="confirm-cancel" (click)="cancelLeave.emit()">
        Cancelar
      </button>
      <button type="button" class="confirm-accept" (click)="confirmLeave.emit()">
        {{ acceptText() }}
      </button>
    </div>
  </div>
</div>
