<div class="game-layout" [class.game-layout--empty]="!publicState()" [style.--hand-height.px]="handHeight()">
  <!-- Winner -->
  @if (winner(); as w) {
  <game-winner [winner]="w" [playerCount]="currentRoom()?.players?.length ?? publicState()?.players?.length ?? 0"
    (reset)="resetGame()" (leave)="leaveAfterWin()"></game-winner>
  }

  <!-- Información de la partida -->
  @if (publicState(); as st) {

  <!-- Tablero de la partida (incluye Info) -->
  <game-board [state]="st" [historyCount]="history().length" (startFailedExperiment)="handleFailedExperiment($event)"
    (startBodySwap)="handleBodySwap($event)" (startApparition)="handleApparition($event)"></game-board>

  <!-- Mano del jugador -->
  <game-hand [hand]="hand()" [isMyTurn]="isMyTurn()" [roomId]="roomId" [publicState]="st" [gameEnded]="isGameEnded()"
    (heightChange)="updateHandHeight($event)"></game-hand>
  }
  <!-- Home -->
  @else {
  <game-empty></game-empty>
  }

  @if (showHistory()) {
  <game-history [history]="history()" (closed)="gameStore.closeHistoryModal()"></game-history>
  }

  <!-- Errores -->
  <game-error [error]="lastError()" (closed)="dismissError()"></game-error>

  @if (showLeave()) {
  <app-confirm-modal title="¿Salir de la partida?"
    description="Si abandonas la partida, perderás tu progreso actual. ¿Quieres volver a la lista de salas?"
    acceptText="Salir" (confirm)="gameStore.leaveGame(roomId)"
    (cancel)="gameStore.closeLeaveModal()"></app-confirm-modal>
  }
</div>
